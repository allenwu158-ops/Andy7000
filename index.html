// 載入雲端進度
window.loadCloudProgress = async (uid) => {
  try {
    const ref = doc(db, "users", uid);
    const snap = await getDoc(ref);
    if (snap.exists()) {
      const data = snap.data();
      // 合併雲端 ws 進本地 S.ws（逐字合併，保留所有欄位）
      if (data.ws) {
        Object.keys(data.ws).forEach(word => {
          if (S.ws[word]) {
            Object.assign(S.ws[word], data.ws[word]);
          } else {
            S.ws[word] = data.ws[word];
          }
        });
      }
      if (data.wxp) {
        Object.keys(data.wxp).forEach(lv => {
          S.wxp[lv] = data.wxp[lv];
        });
      }
      if (data.studied) {
        Object.keys(data.studied).forEach(word => {
          S.studied[word] = data.studied[word];
        });
      }
      if (data.flash) {
        Object.keys(data.flash).forEach(word => {
          S.flash[word] = data.flash[word];
        });
      }
      render();
    }
  } catch(e) { console.error("載入進度失敗", e); }
};

// 儲存學習進度到雲端（學習版用，與精熟資料分開）

// ===== 暱稱 + 手機末五碼登入 =====
function nickKey(nickname, last5){
  // 正規化：去頭尾空白，組合成唯一 ID
  const clean = nickname.trim().replace(/[\/\\\s'"]/g, "");
  return "nick_" + clean + "_" + last5;
}

window.nickSignIn = async (nickname, last5) => {
  nickname = (nickname || "").trim();
  last5 = (last5 || "").trim();
  // 驗證
  if (!nickname) { alert("請輸入暱稱"); return false; }
  if (nickname.length > 20) { alert("暱稱請勿超過 20 個字"); return false; }
  if (!/^\d{5}$/.test(last5)) { alert("手機末五碼請輸入 5 位數字"); return false; }

  const uid = nickKey(nickname, last5);
  try {
    const ref = doc(db, "users", uid);
    const snap = await getDoc(ref);
    const isReturning = snap.exists();

    window.fbUser = {
      uid: uid,
      email: null,
      displayName: nickname,
      photoURL: null,
      isNick: true
    };

    // 更新 header UI
    nickUpdateHeader(nickname);

    // 載入或建立進度
    if (isReturning) {
      await window.loadCloudProgress(uid);
    } else {
      // 新建一筆基本資料
      await setDoc(ref, {
        nickname: nickname,
        createdAt: new Date().toISOString()
      }, { merge: true });
    }
    return isReturning ? "returning" : "new";
  } catch(e) {
    console.error("暱稱登入失敗", e);
    alert("登入失敗，請稍後再試。");
    return false;
  }
};

function nickUpdateHeader(nickname){
  const loginBtn = document.getElementById("fb-login-btn");
  const userInfo = document.getElementById("fb-user-info");
  const hint = document.getElementById("login-hint");
  if (loginBtn) loginBtn.style.display = "none";
  if (hint) hint.style.display = "none";

// ===== 登入彈窗控制 =====
window.openLoginModal = () => {
  document.getElementById("login-modal").style.display = "flex";
  document.getElementById("login-step-choose").style.display = "block";
  document.getElementById("login-step-nick").style.display = "none";
};
window.closeLoginModal = () => {
  document.getElementById("login-modal").style.display = "none";
};
window.showNickForm = () => {
  document.getElementById("login-step-choose").style.display = "none";
  document.getElementById("login-step-nick").style.display = "block";
  setTimeout(() => { const n = document.getElementById("nick-input"); if(n) n.focus(); }, 100);
};
window.backToChoose = () => {
  document.getElementById("login-step-choose").style.display = "block";
  document.getElementById("login-step-nick").style.display = "none";
};
window.submitNick = async () => {
  const nickname = document.getElementById("nick-input").value;
  const last5 = document.getElementById("nick-last5").value;
  const btn = document.getElementById("nick-submit-btn");
  if (btn) { btn.disabled = true; btn.textContent = "處理中..."; }
  const result = await window.nickSignIn(nickname, last5);
  if (btn) { btn.disabled = false; btn.textContent = "開始"; }
  if (result === "returning") {
    window.closeLoginModal();
    if(window.showFl) window.showFl(`歡迎回來，${nickname.trim()}！`, "#34C759");
    if(window.render) window.render();
  } else if (result === "new") {
    window.closeLoginModal();
    if(window.showFl) window.showFl(`進度開始記錄囉！`, "#FF6B35");
    if(window.render) window.render();
  }
  // result === false 時不關閉，讓用戶修正
};

// 沒有就繼續逼它回去，直到真的成功、或撐到安全上限（約 640 毫秒）才停止
function forceScrollTop(){
  window.scrollTo(0,0);
  document.documentElement.scrollTop=0;
  document.body.scrollTop=0;
}
function isAtScrollTop(){
  return (window.scrollY||document.documentElement.scrollTop||document.body.scrollTop||0)===0;
}
function scheduleScrollTop(){
  let attempts=0;
  const MAX_ATTEMPTS=40; // 約 40 幀，撐到 640 毫秒的安全上限
  function tick(){
    forceScrollTop();
    attempts++;
    if(!isAtScrollTop()&&attempts<MAX_ATTEMPTS){
      requestAnimationFrame(tick);
    }
  }
  requestAnimationFrame(tick);
}

let _navSyncing=false; // 避免 popstate 與 pushState 互相觸發
let _lastPushedState=null; // 記住上一次推進歷史紀錄的內容，避免同一個頁面狀態被重複推疊
function syncHistory(){
  // render 時呼叫：把當前頁面狀態推進瀏覽器返回紀錄
  if(_navSyncing)return;
  try{
    const st={page:S.page,lv:S.lv,wk:S.wk};
    const stKey=JSON.stringify(st);
    // 首頁是底層，用 replaceState；其他頁面只有狀態真正改變時才 pushState，
    // 同一個單元裡換卡片、答題這種畫面更新，頁面狀態沒變，不需要重複推疊歷史紀錄
    // （疊太多筆一模一樣的紀錄，會讓瀏覽器的捲動位置還原機制出現非預期的行為）
    if(S.page==="home"){
      history.replaceState(st,"");
      _lastPushedState=stKey;
    }else if(stKey!==_lastPushedState){
      history.pushState(st,"");
      _lastPushedState=stKey;
    }
  }catch(e){}
}

// === 閃卡系統核心函式 ===
function getFlashState(word){return S.flash[word]||{known:null};}
function flashMarkKnown(word){S.flash[word]={known:true};if(window.saveFlashToCloud)window.saveFlashToCloud(word);}
function flashMarkUnknown(word){S.flash[word]={known:false};if(window.saveFlashToCloud)window.saveFlashToCloud(word);}
function buildFlashQueue(words){return words.slice().sort(()=>Math.random()-.5);}
function flashStats(words){let known=0,learning=0,fresh=0;words.forEach(w=>{const st=getFlashState(w.w);if(st.known===true)known++;else if(st.known===false)learning++;else fresh++;});return {known,learning,fresh,total:words.length};}

function goFlashList(lv){S.page="flashList";S.lv=lv;S.wk=null;render();}
// 取得目前單元的所有字
function fcSectionWords(){const words=wordsForLv(S.lv);const start=S.wk*SEC_SIZE;return words.slice(start,start+SEC_SIZE);}
// 依篩選模式建立佇列：all=整個單元，no=只挑標「不會」的字
function buildFlashQueueByFilter(filter){
  const sec=fcSectionWords();
  let pool=sec;
  if(filter==="no")pool=sec.filter(w=>getFlashState(w.w).known===false);
  else if(filter==="new")pool=sec.filter(w=>getFlashState(w.w).known===null);
  return pool.slice().sort(()=>Math.random()-.5);
}
// 切換篩選：重建佇列、從第一張重新開始（上面閃卡 + 下面列表一起連動）
function flashSetFilter(filter){
  if(filter==="no"||filter==="new"){
    const sec=fcSectionWords();
    const pool=filter==="no"?sec.filter(w=>getFlashState(w.w).known===false):sec.filter(w=>getFlashState(w.w).known===null);
    if(!pool.length){
      if(window.fcShowNoEmpty)window.fcShowNoEmpty(filter);
      return;
    }
  }
  S.page="flash"; // 確保回到卡片頁（可能從完成頁的「只練不會」進來）
  S.fcListFilter=filter;
  S.fcQueue=buildFlashQueueByFilter(filter);
  S.fcIdx=0;S.fcFlip=false;S.fcHist=[];
  // 注意：fcRound（本輪會/不會計數）重置，因為這是新的一輪
  S.fcRound={known:0,unknown:0};
  render();
  scheduleScrollTop();
}
function startFlash(lv,wk){
  try{gC();}catch(e){}
  S.page="flash";S.lv=lv;S.wk=wk;
  S.fcListFilter="all";
  const sec=fcSectionWords();
  if(!sec.length)return;
  S.fcQueue=buildFlashQueueByFilter("all");
  S.fcIdx=0;S.fcFlip=false;S.fcRound={known:0,unknown:0};S.fcHist=[];
  render();
  // 用兩層 requestAnimationFrame，確保瀏覽器真的把新畫面畫出來、版面計算完成之後，
  // 捲動指令才執行——如果跟 render() 同一瞬間下指令，在 iOS Safari 上常常會被忽略掉
  scheduleScrollTop();
}
function flashFlip(){
  S.fcFlip=!S.fcFlip;
  const flipper=document.getElementById("fc-flipper");
  if(flipper){
    // 直接操作 DOM 播放 3D 翻轉動畫（render 會重建 DOM 打斷動畫，故不在此 render）
    flipper.style.transform=`rotateY(${S.fcFlip?'180deg':'0deg'})`;
    const cb=document.getElementById("fc-ctrl-back"),cf=document.getElementById("fc-ctrl-front");
    if(cb)cb.style.display=S.fcFlip?"flex":"none";
    if(cf)cf.style.display=S.fcFlip?"none":"flex";
  }else{render();}
}
function flashSwipeOut(known){
  const cardEl=document.getElementById("fc-card");
  if(!cardEl){flashAnswer(known);return;}
  // 飛出動畫：右=會，左=不會
  cardEl.style.transition="transform .35s ease, opacity .35s ease";
  const dir=known?1:-1;
  cardEl.style.transform=`translateX(${dir*600}px) rotate(${dir*30}deg)`;
  cardEl.style.opacity="0";
  // 計數圈跳動回饋
  const cntEl=document.getElementById(known?"fc-cnt-known":"fc-cnt-unknown");
  if(cntEl){cntEl.style.transform="scale(1.3)";setTimeout(()=>{if(cntEl)cntEl.style.transform="scale(1)";},200);}
  setTimeout(()=>{flashAnswer(known);},340);
}
function flashAnswer(known){
  const card=S.fcQueue[S.fcIdx];if(!card){S.fcBusy=false;return;}
  // 記錄這一步，供復原使用（保存標記前的閃卡狀態快照）
  S.fcHist.push({word:card.w,known:known,prevFlash:S.flash[card.w]?JSON.parse(JSON.stringify(S.flash[card.w])):null});
  if(known){flashMarkKnown(card.w);S.fcRound.known++;}
  else{flashMarkUnknown(card.w);S.fcRound.unknown++;}
  // 即時同步下面清單該字的標籤與統計（WordBranch 式連動）
  if(window.flashSyncList)window.flashSyncList(card.w);
  S.fcBusy=false;
  flashNext();
}
// 底部按鈕：標記會/不會（更新計數、連動列表），然後前進到下一張；最後一張則停著
function flashMark(known){
  if(S.fcBusy)return;
  const card=S.fcQueue[S.fcIdx];if(!card)return;
  S.fcHist.push({word:card.w,known:known,prevFlash:S.flash[card.w]?JSON.parse(JSON.stringify(S.flash[card.w])):null,filter:S.fcListFilter,removedIdx:null});
  if(known)flashMarkKnown(card.w);else flashMarkUnknown(card.w);
  // 「不會」模式下標「會」→ 這張不再屬於不會系列，從佇列移除
  // 「還沒學」模式下標任何（會或不會）→ 這張不再是還沒學，從佇列移除
  const shouldRemove=(S.fcListFilter==="no"&&known)||(S.fcListFilter==="new");
  if(shouldRemove){
    S.fcHist[S.fcHist.length-1].removedIdx=S.fcIdx; // 記住移除位置供復原
    S.fcQueue.splice(S.fcIdx,1);
    recalcFcRound();
    if(window.flashSyncList)window.flashSyncList(card.w);
    if(S.fcQueue.length===0){
      // 全部攻克：切回全部模式
      flashSetFilter("all");
      return;
    }
    // 若移除後 fcIdx 超出範圍，退到最後一張
    if(S.fcIdx>=S.fcQueue.length)S.fcIdx=S.fcQueue.length-1;
    S.fcFlip=false;
    const sy=window.scrollY||0;render();if(sy>0)window.scrollTo(0,sy);
    return;
  }
  recalcFcRound();
  if(window.flashSyncList)window.flashSyncList(card.w);
  if(S.fcIdx+1<S.fcQueue.length){S.fcBusy=true;flashGo(1);}
  else{const sy=window.scrollY||0;render();if(sy>0)window.scrollTo(0,sy);}
}
// 依目前佇列裡每個字的實際狀態重算本輪計數（避免重複標記同一張造成計數虛增）
function recalcFcRound(){
  let k=0,u=0;
  S.fcQueue.forEach(c=>{const st=getFlashState(c.w);if(st.known===true)k++;else if(st.known===false)u++;});
  S.fcRound={known:k,unknown:u};
}
function flashUndo(){
  if(!S.fcHist.length)return;
  const last=S.fcHist.pop();
  // 撤銷計數
  if(last.known)S.fcRound.known--;else S.fcRound.unknown--;
  // 還原該字的閃卡狀態
  if(last.prevFlash===null){delete S.flash[last.word];}
  else{S.flash[last.word]=last.prevFlash;}
  if(window.saveFlashToCloud)window.saveFlashToCloud(last.word);
  // 退回上一張，並顯示為已翻面（讓使用者看到剛才那張的內容重新決定）
  S.fcIdx=Math.max(0,S.fcIdx-1);S.fcFlip=true;
  render();
}
function flashNext(){
  S.fcIdx++;S.fcFlip=false;
  if(S.fcIdx>=S.fcQueue.length){S.page="flashDone";render();window.scrollTo(0,0);return;}
  const sy=window.scrollY||0; // 記住目前捲動位置
  render();
  // render 重建畫面後，恢復原本的捲動位置（讓使用者停在原地看清單）
  if(sy>0)window.scrollTo(0,sy);
}
// 純瀏覽：前後翻卡（不分類、不影響會/不會計數）
function flashGo(dir){
  // dir=1 看下一張，dir=-1 看上一張
  const ni=S.fcIdx+dir;
  if(ni<0||ni>=S.fcQueue.length){
    // 已到邊界：彈回原位，不動
    const cardEl=document.getElementById("fc-card");
    if(cardEl){cardEl.style.transition="transform .3s ease";cardEl.style.transform="translateX(0) rotate(0)";}
    S.fcBusy=false;return;
  }
  const cardEl=document.getElementById("fc-card");
  if(!cardEl){S.fcIdx=ni;S.fcFlip=false;render();S.fcBusy=false;return;}
  // 飛出動畫：往下一張時卡片往左飛、往上一張時往右飛
  cardEl.style.transition="transform .28s ease, opacity .28s ease";
  cardEl.style.transform=`translateX(${dir>0?-600:600}px)`;
  cardEl.style.opacity="0";
  setTimeout(()=>{
    S.fcIdx=ni;S.fcFlip=false;
    const sy=window.scrollY||0;
    render();
    if(sy>0)window.scrollTo(0,sy);
    S.fcBusy=false;
  },280);
}

  if(allMastered){const wld=getWld(S.lv);setTimeout(()=>showUnitComplete(wld,S.wk,sec.length),300);return;}
  if(!sec.length)return;let c=sec.filter(w=>!S.ws[w.w].mastered);if(!c.length)c=sec;const prev=S.cQ?S.cQ.w.w:null;c=c.filter(w=>w.w!==prev);if(!c.length)c=sec.filter(w=>w.w!==prev);if(!c.length)c=sec;c.sort((a,b)=>{const sa=S.ws[a.w],sb=S.ws[b.w];if(sa.tw!==sb.tw)return sb.tw-sa.tw;return Math.random()-.5;});const pool=c.slice(0,Math.min(8,c.length));const pick=pool[Math.floor(Math.random()*pool.length)];S.cQ=genQ(pick,words);S.sel=null;S.show=false;render();if(S.cQ.t==="e")setTimeout(()=>speak(S.cQ.w.w),300);}
async function goBackFromQuiz(){
  if(S.weakMode){S.weakMode=false;goHome();}
  else{goLevel(S.lv);}
}

function handleA(ans){if(S.show)return;S.sel=ans;S.show=true;const ok=ans===S.cQ.a,w=S.cQ.w.w,s=S.ws[w];
const wld=S.weakMode?WORLDS[0]:getWld(S.lv);
const prevRank=S.weakMode?null:getCurUnitRank(S.wk,getWkXp());const prevXp=getWkXp();let gXp=0;

function render(){

// innerHTML 重建只會換掉裡面的內容，不會重置 #app 元素本身的樣式，
// 只要 #app 帶著任何殘留的 transform，底下所有 position:fixed 的子元素
// 就會失去「真正貼齊整個螢幕」的效果，改成貼齊 #app，造成各種定位異常
if(app){app.style.transition="none";app.style.transform="none";}
// 離開閃卡頁面時，清掉邊緣返回感應區（它是掛在 document.body 上，不會隨 app.innerHTML 重建而自動消失）

  if(oldEdge)oldEdge.remove();
}

return`<div class="home-card" onclick="goWorldMenu(${w.lv})" style="background:${w.homeBg};animation-delay:${0.7+i*0.1}s"><div class="hc-glow" style="background:${w.homeGlow}"></div><div class="hc-hl"></div><div style="position:absolute;top:20px;right:20px;font-size:0.75rem;font-weight:600;color:${w.homeAccent};padding:4px 12px;border-radius:20px;border:1px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.05)">${rk.n}</div><span style="font-size:2.6rem;display:block;margin-bottom:10px">${w.icon}</span><div style="font-size:1.45rem;font-weight:800;margin-bottom:3px">${w.name}</div><div style="font-size:0.9rem;font-weight:600;letter-spacing:1.5px;margin-bottom:8px;color:${w.homeAccent}">${w.desc}</div><div class="progress-bg" style="height:4px;background:rgba(255,255,255,0.06)"><div class="progress-fill" style="width:${pct}%;background:${w.homeAccent}"></div></div><div style="font-size:0.82rem;color:rgba(255,255,255,0.65);margin-top:6px;display:flex;justify-content:space-between"><span>${words.length} 字 · ${numU} 單元</span><span>${uDone>=numU?"🏆 全部精熟！":uDone>0?"已精熟 "+uDone+" 單元":"已精熟 0 單元"}</span></div></div>`;}).join("");

    const words=wordsForLv(w.lv);

function triggerWordSpeak(el){

  const TAP_MAX=36;   // 視為點擊（翻面）的最大位移（手機觸控天生會有幾像素晃動，門檻放寬避免誤判成滑動）
  const LOCK=20;      // 超過此位移就鎖定主軸方向
  function onStart(x,y,target){
    dragging=true;startX=x;startY=y;dx=0;dy=0;moved=false;axis=null;cardEl.style.transition="none";

    if(axis===null&&(Math.abs(dx)>LOCK||Math.abs(dy)>LOCK)){

  // 獨立於卡片本身的手勢，用一條貼著螢幕左邊、肉眼看不到的窄長感應區來偵測，

    document.body.appendChild(edgeZone);
  }
  let edgeDragging=false,edgeStartX=0,edgeStartY=0,edgeDx=0,edgeAxis=null;
  const EDGE_THRESHOLD=90;
  const EDGE_LOCK=10;
  function edgeOnStart(x,y){
    edgeDragging=true;edgeStartX=x;edgeStartY=y;edgeDx=0;edgeAxis=null;
    if(app)app.style.transition="none";
  }
  function edgeOnMove(x,y){
    if(!edgeDragging)return;
    const dx=x-edgeStartX,dy=y-edgeStartY;
    if(edgeAxis===null&&(Math.abs(dx)>EDGE_LOCK||Math.abs(dy)>EDGE_LOCK)){
      edgeAxis=Math.abs(dx)>Math.abs(dy)?"x":"y";
    }
    if(edgeAxis==="y"){
      // 手指其實是想垂直捲動，不是要滑動返回，取消這次手勢

      return;
    }

    if(app)app.style.transform=`translateX(${edgeDx}px)`;
  }
  function edgeOnEnd(){
    if(!edgeDragging)return;
    edgeDragging=false;

      if(app){app.style.transition="none";app.style.transform="";}

}
}

async function aiQuery(word,mode){
  if(!word){alert("請先輸入一個單字");return;}
  const w=word.toLowerCase().trim();
  const cacheKey=w+"_"+mode;
  const prompt=mode==="memory"?PROMPT_MEMORY:PROMPT_EXAM;
  const question=mode==="memory"?w+" 這個字怎麼記？":w+" 這個字在學測和全民英檢怎麼考？";
  const resultBox=document.getElementById("ai-result");
  const resultText=document.getElementById("ai-result-text");
  resultBox.style.display="block";
  resultText.textContent="AI 助教思考中……";
  resultText.style.color="rgba(0,0,0,0.4)";
  const cached=await window.aiCacheGet(cacheKey);
  if(cached){resultText.innerHTML=highlightPattern(cached);resultText.style.color="#111";return;}
  //const today=new Date().toISOString().slice(0,10);
  //const usageKey="ai_daily_"+today;
  //const used=parseInt(localStorage.getItem(usageKey)||"0");
  //if(used>=15){resultText.textContent="你今天很認真！今天的額度用完了，明天繼續。";resultText.style.color="#c00";return;}
  try{
    var reqBody={system_instruction:{parts:[{text:prompt}]},contents:[{role:"user",parts:[{text:question}]}],generationConfig:{temperature:0}};
    const resp=await fetch("https://gemini-proxy.allenwu158.workers.dev",{
      method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({system:prompt,user:question})
    });
    const data=await resp.json();
    if(data.error){
      resultText.textContent="暫時無法連線，請稍後再試。";
      resultText.style.color="#c00";return;
    }
    const reply=data?.reply||"無法取得回答";
    const cleaned=cleanMd(reply);
    resultText.innerHTML=highlightPattern(cleaned);
    resultText.style.color="#111";
    window.aiCacheSet(cacheKey,cleaned);
    //localStorage.setItem(usageKey,String(used+1));
  }catch(e){
    resultText.textContent="連線失敗："+e.message;
    resultText.style.color="#c00";
  }
}
function cleanMd(t){return t.replace(/\*\*/g,"").replace(/\*/g,"").replace(/`/g,"").replace(/^#+\s*/gm,"").replace(/^[-]\s*/gm,"• ");}
function highlightPattern(text){
  var html=text.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/\n/g,"<br>");
  var idx=html.indexOf("形似記憶法");
  if(idx===-1)return html;
  var before=html.substring(0,idx);
  var after=html.substring(idx);
  var m=text.match(/它們都有\s*-?([a-zA-Z]+)-?/);
  if(m){var p=m[1];after=after.replace(new RegExp("("+p+")","gi"),'<span style="background:#FFFF00;padding:0 1px;border-radius:2px">$1</span>');}
  return before+after;
}
